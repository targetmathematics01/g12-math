<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chapter 1: Complex Numbers Quiz | Target Mathematics</title>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600&family=Alice&display=swap" rel="stylesheet">
    
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script>
        // Recursive Error လုံးဝမဖြစ်စေရန် Native \over ကိုသာ သုံးထားပါသည်
        // Math Font များ Uniform ဖြစ်စေရန် matchFontHeight: false ကို ထည့်သွင်းထားပါသည်
        window.MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                macros: {
                    frac: ["{\\displaystyle {#1 \\over #2}}", 2]
                }
            },
            chtml: {
                displayAlign: "center",
                matchFontHeight: false, 
                scale: 1
            },
            startup: {
                pageReady: () => {
                    return MathJax.startup.defaultPageReady().then(() => {
                        // Display Math များအတွက် Wrapper (Block Level Swipe)
                        document.querySelectorAll('mjx-container[display="true"]').forEach(node => {
                            const wrapper = document.createElement('div');
                            wrapper.className = 'math-display-wrapper';
                            node.parentNode.insertBefore(wrapper, node);
                            wrapper.appendChild(node);
                        });
                        
                        // Inline Math များအတွက် Wrapper (Inline Level Swipe - Exercise Box များအတွက် အထူး)
                        document.querySelectorAll('mjx-container:not([display="true"])').forEach(node => {
                            const wrapper = document.createElement('span');
                            wrapper.className = 'math-inline-wrapper';
                            node.parentNode.insertBefore(wrapper, node);
                            wrapper.appendChild(node);
                        });
                    });
                }
            }
        };
    </script>
   <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    
    <style>
        body { font-family: 'Open Sans', sans-serif; background-color: #f4f7f6; margin: 0; padding: 0; }
        header { background: #0056b3; color: white; padding: 20px 0; text-align: center; margin-bottom: 30px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .logo { font-size: 28px; font-weight: 600; letter-spacing: 2px; color: #f39c12; }
        .logo span { color: #f4f6f1; }
        .container { max-width: 1000px; margin: 0 auto; padding: 0 20px; }
        
        .content-box { background: #fff; padding: 40px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); margin-bottom: 40px; text-align: left; }
        .content-box h1 { color: #333; margin-bottom: 10px; text-align: center; font-family: 'Alice', serif; }
        .content-box p.subtitle { text-align: center; color: #777; margin-bottom: 40px; font-size: 1.1em; }
        
        .quiz-header { background-color: #e8f4f8; border-left: 5px solid #0056b3; padding: 20px; border-radius: 4px; margin-bottom: 30px; }
        .quiz-header p { margin: 0; color: #333; font-weight: 600; }

        .question-card { background: #fafafa; padding: 25px; margin-bottom: 25px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.03); border: 1px solid #eee; border-left: 5px solid #0056b3; transition: border-left-color 0.3s; }
        .question-card p { margin-top: 0; font-size: 16px; color: #333; }
        
        .options { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 15px; }
        .option-label { display: flex; align-items: center; cursor: pointer; padding: 12px 15px; background-color: #fff; border: 1px solid #ccc; border-radius: 6px; transition: all 0.2s ease; font-size: 15px; }
        .option-label:hover { background-color: #e8f4f8; border-color: #0056b3; }
        input[type="radio"] { margin-right: 12px; transform: scale(1.2); cursor: pointer; }
        
        .submit-btn { display: block; width: 100%; padding: 18px; background-color: #0056b3; color: white; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 35px; transition: 0.3s; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .submit-btn:disabled { background-color: #a0bcdc; cursor: not-allowed; box-shadow: none; }
        .submit-btn:not(:disabled):hover { background-color: #004494; }
        
        #result { margin-top: 35px; padding: 30px; background: #ffffff; border-radius: 8px; display: none; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border: 2px solid #28a745; }
        .wrong-answer { color: #c0392b; margin-bottom: 15px; padding: 15px; background-color: #fcebeb; border-radius: 5px; border-left: 4px solid #c0392b; line-height: 1.6; }
        .score-display { font-size: 26px; font-weight: bold; color: #0056b3; text-align: center; margin-bottom: 20px; padding-bottom: 15px; border-bottom: 2px solid #eee; }

        .page-navigation { display: flex; justify-content: space-between; margin-top: 50px; border-top: 2px solid #eee; padding-top: 20px; }
        .btn-nav { display: inline-block; padding: 12px 24px; background-color: #f0f0f0; color: #333; text-decoration: none; border-radius: 6px; font-weight: 600; transition: background 0.3s; text-align: center; border: 1px solid #ccc; }
        .btn-nav:hover { background-color: #e0e0e0; }

        @media (max-width: 768px) {
            .content-box { padding: 25px 15px; }
            .options { grid-template-columns: 1fr; }
            .page-navigation { flex-direction: column; gap: 15px; }
            .btn-nav { width: 100%; box-sizing: border-box; }
        }

        .top-nav-box {
            display: flex;
            justify-content: center;
            gap: 15px;
            background-color: #fff;
            border-radius: 12px;
            padding: 10px;
            margin-top: -25px;
            margin-bottom: 40px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            position: sticky;
            top: 15px;
            z-index: 100;
        }
        .nav-link {
            padding: 12px 30px;
            text-decoration: none;
            color: #555;
            font-weight: 600;
            font-size: 15px;
            border-radius: 8px;
            transition: all 0.3s ease;
        }
        .nav-link:hover {
            color: #0056b3;
            background-color: #f4f7f6;
        }
        .nav-link.active {
            color: #0056b3;
            background-color: #e8f4f8;
        }
        @media (max-width: 768px) {
            .top-nav-box { flex-direction: row; flex-wrap: wrap; gap: 5px; margin-top: 20px; }
            .nav-link { flex: 1; text-align: center; padding: 12px 10px; font-size: 14px; }
        }
    </style>
</head>
<body>

    <div class="container">
        
        <div class="content-box">
            <h1>Chapter 1: Complex Numbers</h1>
            <p class="subtitle">Chapter Quiz & Assessment</p>

            <div class="quiz-header">
                <p>Please answer all 40 questions below. The submit button will be enabled once completed.</p>
            </div>

            <form id="quizForm">
                <div id="questionsContainer"></div>
                <button type="submit" id="submitBtn" class="submit-btn" disabled>Submit Answers</button>
            </form>

            <div id="result"></div>

           

    <script>
        // Full Array containing all 40 questions
        const questions = [
            { id: 1, text: "The value of \\( i^{23} \\) is", options: { A: "1", B: "-1", C: "\\( i \\)", D: "\\( -i \\)" }, answer: "D" },
            { id: 2, text: "The value of \\( i^{-71} \\) is", options: { A: "1", B: "-1", C: "\\( i \\)", D: "\\( -i \\)" }, answer: "C" },
            { id: 3, text: "The value of \\( i^{37} + i^{-61} \\) is", options: { A: "0", B: "1", C: "\\( i \\)", D: "\\( -i \\)" }, answer: "A" },
            { id: 4, text: "The value of \\( (-i)^{4n+3} \\) is", options: { A: "1", B: "-1", C: "\\( i \\)", D: "\\( -i \\)" }, answer: "C" },
            { id: 5, text: "The value of \\( i^{2024} \\) is", options: { A: "-1", B: "1", C: "\\( i \\)", D: "\\( -i \\)" }, answer: "B" },
            { id: 6, text: "The value of \\( i^{57} + \\frac{1}{i^{125}} \\) is", options: { A: "0", B: "\\( 2i \\)", C: "\\( -2i \\)", D: "2" }, answer: "A" },
            { id: 7, text: "\\( 1 + i + i^2 + i^3 \\) is equal to", options: { A: "1", B: "0", C: "-1", D: "\\( i \\)" }, answer: "B" },
            { id: 8, text: "The value of \\( 3i^{34} + 5i^{27} - 2i^{38} + 5i^{41} = \\)", options: { A: "1", B: "-1", C: "\\( -4i \\)", D: "\\( 10i \\)" }, answer: "B" },
            { id: 9, text: "The value of \\( i^n + i^{n+1} + i^{n+2} + i^{n+3} = \\)", options: { A: "\\( i \\)", B: "\\( i^n \\)", C: "1", D: "0" }, answer: "D" },
            { id: 10, text: "The complex number form of the number of solutions in \\( x^2 - 6x + 10 = 0 \\) is", options: { A: "1", B: "2", C: "3", D: "4" }, answer: "B" },
            { id: 11, text: "The two solutions of the quadratic equation \\( x^2 + 2x + 3 = 0 \\) are", options: { A: "\\( -1 + \\sqrt{2}i \\) and \\( -1 - \\sqrt{2}i \\)", B: "\\( 1 + \\sqrt{2}i \\) and \\( -1 - \\sqrt{2}i \\)", C: "\\( 1 + \\sqrt{2}i \\) and \\( -1 + \\sqrt{2}i \\)", D: "\\( 1 + \\sqrt{2}i \\) and \\( 1 + \\sqrt{2}i \\)" }, answer: "A" },
            { id: 12, text: "Given two complex numbers \\( z_1 = 4 - 3i \\) and \\( z_2 = 2a + bi \\). If \\( z_1 = z_2 \\), the real values of \\( a \\) and \\( b \\) are", options: { A: "\\( a = -2 \\) and \\( b = 3 \\)", B: "\\( a = 2 \\) and \\( b = 3 \\)", C: "\\( a = 2 \\) and \\( b = -3 \\)", D: "\\( a = -2 \\) and \\( b = -3 \\)" }, answer: "C" },
            { id: 13, text: "\\( x + 3 + (y - 2)i = 5 + 2i \\), find the values of \\( x \\) and \\( y \\).", options: { A: "\\( x = 8 \\) and \\( y = 4 \\)", B: "\\( x = 2 \\) and \\( y = 4 \\)", C: "\\( x = 2 \\) and \\( y = 0 \\)", D: "\\( x = 8 \\) and \\( y = 0 \\)" }, answer: "B" },
            { id: 14, text: "\\( (2a - 3) + 2bi = 5 + 6i \\), find the values of \\( a \\) and \\( b \\).", options: { A: "\\( a = 3 \\) and \\( b = 4 \\)", B: "\\( a = 4 \\) and \\( b = 3 \\)", C: "\\( a = 1 \\) and \\( b = 3 \\)", D: "\\( a = 2 \\) and \\( b = 8 \\)" }, answer: "B" },
            { id: 15, text: "\\( x + yi = (2 + 3i) + 7(1 - i) \\), then the values of \\( x \\) and \\( y \\) are", options: { A: "\\( x = -4 \\) and \\( y = 9 \\)", B: "\\( x = -9 \\) and \\( y = 4 \\)", C: "\\( x = 9 \\) and \\( y = -4 \\)", D: "\\( x = 9 \\) and \\( y = 4 \\)" }, answer: "C" },
            { id: 16, text: "If \\( 2y + (3x - y)i = 5 - 2i \\), then the real values of \\( x \\) and \\( y \\) are", options: { A: "\\( x = \\frac{1}{6} \\) and \\( y = \\frac{5}{2} \\)", B: "\\( x = -\\frac{1}{6} \\) and \\( y = -\\frac{5}{2} \\)", C: "\\( x = -\\frac{1}{6} \\) and \\( y = \\frac{5}{2} \\)", D: "\\( x = \\frac{1}{6} \\) and \\( y = -\\frac{5}{2} \\)" }, answer: "A" },
            { id: 17, text: "The real values of \\( a \\) and \\( b \\) such that \\( (2a + 3b) + (a - 2b)i = -1 + 3i \\) are", options: { A: "\\( a = 1, b = 1 \\)", B: "\\( a = 1, b = -1 \\)", C: "\\( a = -1, b = 1 \\)", D: "\\( a = -1, b = -1 \\)" }, answer: "B" },
            { id: 18, text: "The value of \\( (-2, 3)(1, -2) + (1, 1)(0, 1) \\) is", options: { A: "\\( (3, -8) \\)", B: "\\( (-3, 8) \\)", C: "\\( (3, 8) \\)", D: "\\( (-3, 8) \\)" }, answer: "C" },
            { id: 19, text: "The value of \\( (1, 0)(0, 1) + (0, 1)(1, 0) \\) is", options: { A: "\\( (2, 2) \\)", B: "\\( (2, 0) \\)", C: "\\( (0, 0) \\)", D: "\\( (0, 2) \\)" }, answer: "D" },
            { id: 20, text: "The value of \\( 2(2i - 1) - 3(4 - 2i) \\) is", options: { A: "\\( 10 + 10i \\)", B: "\\( -14 + 4i \\)", C: "\\( -14 + 10i \\)", D: "\\( 14 + 10i \\)" }, answer: "C" },
            { id: 21, text: "Let \\( z = 3 + i \\) and \\( w = 1 - 2i \\), then \\( 2z - 3w = \\)", options: { A: "\\( 3 - 8i \\)", B: "\\( -3 + 8i \\)", C: "\\( -3 - 8i \\)", D: "\\( 3 + 8i \\)" }, answer: "D" },
            { id: 22, text: "Let \\( z_1 = 1 + 2i \\) and \\( z_2 = 2 - i \\), then \\( 2z_1 - 3z_2 = \\)", options: { A: "\\( -4 + 7i \\)", B: "\\( -4 - i \\)", C: "\\( 4 - 3i \\)", D: "\\( 7 + i \\)" }, answer: "A" },
            { id: 23, text: "The value of \\( (3 + 2i)(3 - 2i) + (-5 + 7i)(-1 - i) \\) is", options: { A: "\\( 25 + 2i \\)", B: "\\( 25 - 2i \\)", C: "\\( -25 - 2i \\)", D: "\\( 1 - 2i \\)" }, answer: "B" },
            { id: 24, text: "Given that \\( z_1 = -2 + 3i \\) and \\( z_2 = 7 - 5i \\), the value of \\( z_1 z_2 \\) is", options: { A: "\\( -29 + 31i \\)", B: "\\( 1 + 11i \\)", C: "\\( 1 + 31i \\)", D: "\\( -1 + 31i \\)" }, answer: "C" },
            { id: 25, text: "\\( (8 - 4i)(-3 + 5i) = \\)", options: { A: "\\( -44 + 52i \\)", B: "\\( -4 + 28i \\)", C: "\\( -44 + 28i \\)", D: "\\( -4 + 52i \\)" }, answer: "D" },
            { id: 26, text: "The value of \\( (4 + 5i)^2 \\) is", options: { A: "\\( 44 + 40i \\)", B: "\\( -41 - 40i \\)", C: "\\( -9 - 40i \\)", D: "\\( -9 + 40i \\)" }, answer: "D" },
            { id: 27, text: "Given that \\( z = 3 + i \\) and \\( w = 1 - 2i \\), then \\( z^2 + w^2 = \\)", options: { A: "\\( 5 + 2i \\)", B: "\\( 5 - 2i \\)", C: "\\( 13 - 2i \\)", D: "\\( 13 + 10i \\)" }, answer: "A" },
            { id: 28, text: "The complex conjugate of \\( -1 - 5i \\) is", options: { A: "\\( 1 - 5i \\)", B: "\\( -1 + 5i \\)", C: "\\( 1 - 5i \\)", D: "\\( 1 + 5i \\)" }, answer: "B" },
            { id: 29, text: "The complex conjugate of \\( 2 \\) is", options: { A: "\\( -2 \\)", B: "2", C: "\\( -2i \\)", D: "\\( 2i \\)" }, answer: "B" },
            { id: 30, text: "The conjugate of \\( \\frac{i}{-1 + 3i} \\) is", options: { A: "\\( \\frac{3}{10} + \\frac{1}{10}i \\)", B: "\\( \\frac{3}{10} - \\frac{1}{10}i \\)", C: "\\( -\\frac{3}{10} + \\frac{1}{10}i \\)", D: "\\( -\\frac{1}{10} - \\frac{3}{10}i \\)" }, answer: "A" },
            { id: 31, text: "The conjugate of \\( \\frac{-4 - 3i}{i} \\) is", options: { A: "\\( 3 + 4i \\)", B: "\\( 3 - 4i \\)", C: "\\( -3 - 4i \\)", D: "\\( -3 + 4i \\)" }, answer: "C" },
            { id: 32, text: "If \\( z = 3 + \\sqrt{2}i \\), then \\( z\\bar{z} = \\)", options: { A: "5", B: "7", C: "11", D: "\\( \\sqrt{11} \\)" }, answer: "C" },
            { id: 33, text: "If \\( z = -2 + 3i \\), then the multiplication inverse of \\( z \\) is", options: { A: "\\( -\\frac{2}{13} + \\frac{3}{13}i \\)", B: "\\( -\\frac{2}{13} - \\frac{3}{13}i \\)", C: "\\( -\\frac{2}{5} + \\frac{3}{5}i \\)", D: "\\( -\\frac{2}{5} - \\frac{3}{5}i \\)" }, answer: "B" },
            { id: 34, text: "The multiplication inverse of \\( 5 + 2i \\) is", options: { A: "\\( \\frac{5}{29} + \\frac{2}{29}i \\)", B: "\\( -\\frac{5}{29} + \\frac{2}{29}i \\)", C: "\\( \\frac{5}{29} - \\frac{2}{29}i \\)", D: "\\( \\frac{5}{21} - \\frac{2}{21}i \\)" }, answer: "C" },
            { id: 35, text: "The \\( a + bi \\) form of \\( \\frac{4 + i}{2 - 3i} \\) is", options: { A: "\\( \\frac{5}{13} - \\frac{14}{13}i \\)", B: "\\( -\\frac{5}{13} + \\frac{14}{13}i \\)", C: "\\( \\frac{5}{13} + \\frac{14}{13}i \\)", D: "\\( -\\frac{5}{13} - \\frac{11}{13}i \\)" }, answer: "C" },
            { id: 36, text: "Let \\( z = \\frac{1}{3 - 2i} \\) , express \\( z \\) in the form of \\( a + bi \\).", options: { A: "\\( \\frac{3}{13} - \\frac{2}{13}i \\)", B: "\\( \\frac{3}{5} - \\frac{2}{5}i \\)", C: "\\( \\frac{3}{13} + \\frac{2}{13}i \\)", D: "\\( \\frac{3}{5} + \\frac{2}{5}i \\)" }, answer: "C" },
            { id: 37, text: "The value of \\( \\frac{2 + 3i}{3 + i} \\) is", options: { A: "\\( \\frac{1}{10}(9 + 7i) \\)", B: "\\( \\frac{1}{8}(9 + 7i) \\)", C: "\\( \\frac{1}{10}(9 - 11i) \\)", D: "\\( \\frac{1}{8}(9 + 11i) \\)" }, answer: "A" },
            { id: 38, text: "The value of \\( \\left( \\frac{1 - i}{1 + i} \\right)^2 \\) is", options: { A: "\\( i \\)", B: "\\( -i \\)", C: "1", D: "-1" }, answer: "D" },
            { id: 39, text: "The smallest value of n for which \\( \\left( \\frac{1 + i}{1 - i} \\right)^n = 1 \\) is", options: { A: "1", B: "2", C: "3", D: "4" }, answer: "D" },
            { id: 40, text: "The value of \\( (1 + i)^{-1} \\) is", options: { A: "\\( 2 - i \\)", B: "\\( -\\frac{1}{2} + \\frac{1}{2}i \\)", C: "\\( \\frac{1}{2} - \\frac{1}{2}i \\)", D: "\\( -\\frac{1}{2} - \\frac{1}{2}i \\)" }, answer: "C" }
        ];

        const container = document.getElementById('questionsContainer');
        const submitBtn = document.getElementById('submitBtn');
        const quizForm = document.getElementById('quizForm');
        let answeredQuestions = new Set();

        // Render Questions
        questions.forEach((q) => {
            let optionsHtml = '';
            for (const [key, value] of Object.entries(q.options)) {
                optionsHtml += `
                    <label class="option-label">
                        <input type="radio" name="q${q.id}" value="${key}" required>
                        ${key}. ${value}
                    </label>
                `;
            }

            const questionHtml = `
                <div class="question-card" id="card-q${q.id}">
                    <p><strong>${q.id}. ${q.text}</strong></p>
                    <div class="options">
                        ${optionsHtml}
                    </div>
                </div>
            `;
            container.innerHTML += questionHtml;
        });

        // Check if all 40 questions are answered
        quizForm.addEventListener('change', function(e) {
            if (e.target.type === 'radio') {
                answeredQuestions.add(e.target.name);
                if (answeredQuestions.size === questions.length) {
                    submitBtn.disabled = false;
                    submitBtn.innerText = "Submit Answers";
                } else {
                    submitBtn.innerText = `Answered ${answeredQuestions.size} / ${questions.length} Questions`;
                }
            }
        });

        // Handle Submit and Show Mistakes
        quizForm.addEventListener('submit', function(e) {
            e.preventDefault();
            let score = 0;
            let mistakesHtml = "";
            const formData = new FormData(quizForm);
            
            questions.forEach(q => {
                const userAnswer = formData.get(`q${q.id}`);
                const card = document.getElementById(`card-q${q.id}`);
                
                // Reset card styling
                card.style.borderLeftColor = "#0056b3"; 

                if (userAnswer === q.answer) {
                    score++;
                    card.style.borderLeftColor = "#28a745"; // Green for correct
                } else {
                    card.style.borderLeftColor = "#dc3545"; // Red for incorrect
                    mistakesHtml += `
                        <div class="wrong-answer">
                            <strong>Question ${q.id}:</strong> Your answer was <b>${userAnswer || 'None'}</b>. <br>
                            The correct answer is <b>${q.answer}</b>. (${q.options[q.answer]})
                        </div>
                    `;
                }
            });

            const resultDiv = document.getElementById('result');
            resultDiv.style.display = 'block';
            
            let finalHtml = `<div class="score-display">Your Score: ${score} / ${questions.length}</div>`;
            
            if (score === questions.length) {
                finalHtml += `<p style="text-align:center; color: #28a745; font-weight:bold; font-size: 18px;">Excellent! All answers are correct.</p>`;
            } else {
                finalHtml += `<h4 style="color:#d9534f; margin-top: 0;">Review Your Mistakes:</h4>` + mistakesHtml;
            }

            resultDiv.innerHTML = finalHtml;
            
            // Re-render MathJax in case equations are in the result div
            if (window.MathJax) {
                MathJax.typesetPromise([resultDiv]);
            }

            // Scroll to the results
            resultDiv.scrollIntoView({ behavior: 'smooth' });
        });
    </script>
</body>
</html>
