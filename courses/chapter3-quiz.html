<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chapter 3: Analytical Solid Geometry Quiz | Target Mathematics</title>
     <link rel="icon" type="image/ico" href="favicon.ico">
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600&family=Alice&display=swap" rel="stylesheet">
    
   <script>
        // Recursive Error လုံးဝမဖြစ်စေရန် Native \over ကိုသာ သုံးထားပါသည်
        // Math Font များ Uniform ဖြစ်စေရန် matchFontHeight: false ကို ထည့်သွင်းထားပါသည်
        window.MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                macros: {
                    frac: ["{\\displaystyle {#1 \\over #2}}", 2]
                }
            },
            chtml: {
                displayAlign: "center",
                matchFontHeight: false, 
                scale: 1
            },
            startup: {
                pageReady: () => {
                    return MathJax.startup.defaultPageReady().then(() => {
                        // Display Math များအတွက် Wrapper (Block Level Swipe)
                        document.querySelectorAll('mjx-container[display="true"]').forEach(node => {
                            const wrapper = document.createElement('div');
                            wrapper.className = 'math-display-wrapper';
                            node.parentNode.insertBefore(wrapper, node);
                            wrapper.appendChild(node);
                        });
                        
                        // Inline Math များအတွက် Wrapper (Inline Level Swipe - Exercise Box များအတွက် အထူး)
                        document.querySelectorAll('mjx-container:not([display="true"])').forEach(node => {
                            const wrapper = document.createElement('span');
                            wrapper.className = 'math-inline-wrapper';
                            node.parentNode.insertBefore(wrapper, node);
                            wrapper.appendChild(node);
                        });
                    });
                }
            }
        };
    </script>
   <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <style>
        body { font-family: 'Open Sans', sans-serif; background-color: #f4f7f6; margin: 0; padding: 0; }
        header { background: #0056b3; color: white; padding: 20px 0; text-align: center; margin-bottom: 30px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .logo { font-size: 28px; font-weight: 600; letter-spacing: 2px; color: #f39c12; }
        .logo span { color: #f4f6f1; }
        .container { max-width: 1000px; margin: 0 auto; padding: 0 20px; }
        
        .content-box { background: #fff; padding: 40px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); margin-bottom: 40px; text-align: left; }
        .content-box h1 { color: #333; margin-bottom: 10px; text-align: center; font-family: 'Alice', serif; }
        .content-box p.subtitle { text-align: center; color: #777; margin-bottom: 40px; font-size: 1.1em; }
        
        .quiz-header { background-color: #e8f4f8; border-left: 5px solid #0056b3; padding: 20px; border-radius: 4px; margin-bottom: 30px; }
        .quiz-header p { margin: 0; color: #333; font-weight: 600; }

        .question-card { background: #fafafa; padding: 25px; margin-bottom: 25px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.03); border: 1px solid #eee; border-left: 5px solid #0056b3; transition: border-left-color 0.3s; }
        .question-card p { margin-top: 0; font-size: 16px; color: #333; }
        
        .options { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 15px; }
        .option-label { display: flex; align-items: center; cursor: pointer; padding: 12px 15px; background-color: #fff; border: 1px solid #ccc; border-radius: 6px; transition: all 0.2s ease; font-size: 15px; }
        .option-label:hover { background-color: #e8f4f8; border-color: #0056b3; }
        input[type="radio"] { margin-right: 12px; transform: scale(1.2); cursor: pointer; }
        
        .submit-btn { display: block; width: 100%; padding: 18px; background-color: #0056b3; color: white; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 35px; transition: 0.3s; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .submit-btn:disabled { background-color: #a0bcdc; cursor: not-allowed; box-shadow: none; }
        .submit-btn:not(:disabled):hover { background-color: #004494; }
        
        #result { margin-top: 35px; padding: 30px; background: #ffffff; border-radius: 8px; display: none; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border: 2px solid #28a745; }
        .wrong-answer { color: #c0392b; margin-bottom: 15px; padding: 15px; background-color: #fcebeb; border-radius: 5px; border-left: 4px solid #c0392b; line-height: 1.6; }
        .score-display { font-size: 26px; font-weight: bold; color: #0056b3; text-align: center; margin-bottom: 20px; padding-bottom: 15px; border-bottom: 2px solid #eee; }

        .page-navigation { display: flex; justify-content: space-between; margin-top: 50px; border-top: 2px solid #eee; padding-top: 20px; }
        .btn-nav { display: inline-block; padding: 12px 24px; background-color: #f0f0f0; color: #333; text-decoration: none; border-radius: 6px; font-weight: 600; transition: background 0.3s; text-align: center; border: 1px solid #ccc; }
        .btn-nav:hover { background-color: #e0e0e0; }

        @media (max-width: 768px) {
            .content-box { padding: 25px 15px; }
            .options { grid-template-columns: 1fr; }
            .page-navigation { flex-direction: column; gap: 15px; }
            .btn-nav { width: 100%; box-sizing: border-box; }
        }

        .top-nav-box {
            display: flex;
            justify-content: center;
            gap: 15px;
            background-color: #fff;
            border-radius: 12px;
            padding: 10px;
            margin-top: -25px;
            margin-bottom: 40px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            position: sticky;
            top: 15px;
            z-index: 100;
        }
        .nav-link {
            padding: 12px 30px;
            text-decoration: none;
            color: #555;
            font-weight: 600;
            font-size: 15px;
            border-radius: 8px;
            transition: all 0.3s ease;
        }
        .nav-link:hover {
            color: #0056b3;
            background-color: #f4f7f6;
        }
        .nav-link.active {
            color: #0056b3;
            background-color: #e8f4f8;
        }
        @media (max-width: 768px) {
            .top-nav-box { flex-direction: row; flex-wrap: wrap; gap: 5px; margin-top: 20px; }
            .nav-link { flex: 1; text-align: center; padding: 12px 10px; font-size: 14px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="content-box">
            <h1>Chapter 3: Analytical Solid Geometry</h1>
            <p class="subtitle">Part 1: Printed Questions (Section A)</p>

            <div class="quiz-header">
                <p>Please answer all 34 questions below. The submit button will be enabled once completed.</p>
            </div>

            <form id="quizForm">
                <div id="questionsContainer"></div>
                <button type="submit" id="submitBtn" class="submit-btn" disabled>Submit Answers</button>
            </form>

            <div id="result"></div>
        </div>
    </div>
    <script>
        // Full Array containing all 34 questions
        const questions = [
            { id: 1, text: "Given \\( P(1, 2, 3) \\) and \\( Q(3, 6, 5) \\), the coordinates of the point on the line \\( PQ \\) with respect to the point \\( P \\) and the parameter \\( \\displaystyle \\frac{1}{2} \\) is", options: { A: "\\( (2, 4, 5) \\)", B: "\\( (2, 4, 4) \\)", C: "\\( (3, 6, 4) \\)", D: "\\( (2, 4, 6) \\)" }, answer: "B" },
            { id: 2, text: "If the points are \\( A(-1, 2, 5) \\), \\( B(1, 1, 6) \\) and \\( C(0, 5, 6) \\), then \\( \\angle BAC \\) is", options: { A: "\\( 90^{\\circ} \\)", B: "\\( 60^{\\circ} \\)", C: "\\( 30^{\\circ} \\)", D: "\\( 45^{\\circ} \\)" }, answer: "A" },
            { id: 3, text: "The point of intersection of the line through the point \\( (-3, 5, 7) \\) and perpendicular to \\( yz \\)-plane is", options: { A: "\\( (0, 5, 7) \\)", B: "\\( (-3, 5, 0) \\)", C: "\\( (-3, 0, 7) \\)", D: "\\( (-3, 5, 1) \\)" }, answer: "A" },
            { id: 4, text: "The equation of the plane containing the point \\( (1, -2, 3) \\) and parallel to \\( zx \\)-plane is", options: { A: "\\( z = 3 \\)", B: "\\( x = 1 \\)", C: "\\( y = -2 \\)", D: "\\( z = 0 \\)" }, answer: "C" },
            { id: 5, text: "The directed value of two parallel lines are \\( \\langle 3, 6, 3 \\rangle \\) and \\( \\langle 12, p, q \\rangle \\). Then \\( p - q = \\)", options: { A: "\\( 3 \\)", B: "\\( 10 \\)", C: "\\( 12 \\)", D: "\\( 15 \\)" }, answer: "C" },
            { id: 6, text: "The plane \\( 6x - py + qz = 2k \\) containing the point \\( (1, -3, 2) \\) and parallel to the plane \\( 3x - 2y - 3z = 2 \\). The value of \\( k \\) is", options: { A: "\\( 3 \\)", B: "\\( 10 \\)", C: "\\( 2 \\)", D: "\\( 15 \\)" }, answer: "A" },
            { id: 7, text: "Which of the following points is passing through the sphere \\( (x - 2)^2 + (y - 1)^2 + (z + 1)^2 = 14 \\)?", options: { A: "\\( (0, 0, 0) \\)", B: "\\( (3, 4, 1) \\)", C: "\\( (2, 3, 1) \\)", D: "\\( (2, 4, 1) \\)" }, answer: "B" },
            { id: 8, text: "The equation of the \\( XOY \\)-plane is", options: { A: "\\( x = 0 \\)", B: "\\( y = 0 \\)", C: "\\( z = 0 \\)", D: "\\( z = c, c \\neq 0 \\)" }, answer: "C" },
            { id: 9, text: "The points \\( (3, 2, 2) \\), \\( (-1, 1, 3) \\), \\( (0, 5, 6) \\), \\( (2, 1, 6) \\) lie on a sphere whose center is \\( (1, 3, 4) \\). The radius of the sphere is", options: { A: "\\( 4 \\)", B: "\\( 3 \\)", C: "\\( 5 \\)", D: "\\( 2 \\)" }, answer: "B" },
            { id: 10, text: "The equation of \\( z \\)-axis is", options: { A: "\\( z = 0 \\)", B: "\\( y = 0, z = 0 \\)", C: "\\( x = 0, y = 0 \\)", D: "\\( z = 0, x = 0 \\)" }, answer: "C" },
            { id: 11, text: "The coordinates of the point on the \\( x \\)-axis are of the form.", options: { A: "\\( (x, 0, 0) \\)", B: "\\( (0, y, 0) \\)", C: "\\( (0, 0, z) \\)", D: "\\( (0, x, 0) \\)" }, answer: "A" },
            { id: 12, text: "The coordinates of the point on the \\( y \\)-axis are of the form", options: { A: "\\( (x, 0, 0) \\)", B: "\\( (0, y, 0) \\)", C: "\\( (0, 0, z) \\)", D: "\\( (0, 0, y) \\)" }, answer: "B" },
            { id: 13, text: "The coordinates of the point on the \\( z \\)-axis are of the form", options: { A: "\\( (x, 0, 0) \\)", B: "\\( (0, y, 0) \\)", C: "\\( (0, 0, z) \\)", D: "\\( (z, 0, 0) \\)" }, answer: "C" },
            { id: 14, text: "The coordinates of the point on the \\( xy \\)-plane are of the form", options: { A: "\\( (x, y, 0) \\)", B: "\\( (x, 0, y) \\)", C: "\\( (0, x, y) \\)", D: "\\( (x, 0, 0) \\)" }, answer: "A" },
            { id: 15, text: "The coordinates of the point on the \\( yz \\)-plane are of the form", options: { A: "\\( (y, z, 0) \\)", B: "\\( (0, y, z) \\)", C: "\\( (0, y, 0) \\)", D: "\\( (y, 0, z) \\)" }, answer: "B" },
            { id: 16, text: "The coordinates of the point on the \\( zx \\)-plane are of the form", options: { A: "\\( (x, z, 0) \\)", B: "\\( (z, x, 0) \\)", C: "\\( (x, 0, z) \\)", D: "\\( (0, z, x) \\)" }, answer: "C" },
            { id: 17, text: "The coordinates of the plane containing the point \\( (a, b, c) \\) and parallel to \\( xy \\)-plane are of the form", options: { A: "\\( (x, y, a) \\)", B: "\\( (x, y, b) \\)", C: "\\( (x, y, c) \\)", D: "\\( (a, b, z) \\)" }, answer: "C" },
            { id: 18, text: "The coordinates of the plane containing the point \\( (a, b, c) \\) and parallel to \\( yz \\)-plane are of the form", options: { A: "\\( (a, y, z) \\)", B: "\\( (b, y, z) \\)", C: "\\( (c, y, z) \\)", D: "\\( (x, b, c) \\)" }, answer: "A" },
            { id: 19, text: "The coordinates of the plane containing the point \\( (a, b, c) \\) and parallel to \\( zx \\)-plane are of the form", options: { A: "\\( (x, a, z) \\)", B: "\\( (x, b, z) \\)", C: "\\( (x, c, z) \\)", D: "\\( (a, y, c) \\)" }, answer: "B" },
            { id: 20, text: "The coordinates of the line perpendicular to the \\( xy \\)-plane and passing through the point \\( (a, b, c) \\) are of the form", options: { A: "\\( (a, b, z) \\)", B: "\\( (x, y, c) \\)", C: "\\( (x, b, c) \\)", D: "\\( (a, y, c) \\)" }, answer: "A" },
            { id: 21, text: "The coordinates of the line perpendicular to the \\( yz \\)-plane and passing through the point \\( (a, b, c) \\) are of the form", options: { A: "\\( (a, y, z) \\)", B: "\\( (x, y, c) \\)", C: "\\( (x, b, c) \\)", D: "\\( (a, y, c) \\)" }, answer: "C" },
            { id: 22, text: "The coordinates of the line perpendicular to the \\( zx \\)-plane and passing through the point \\( (a, b, c) \\) are of the form", options: { A: "\\( (a, b, z) \\)", B: "\\( (x, y, c) \\)", C: "\\( (x, b, c) \\)", D: "\\( (a, y, c) \\)" }, answer: "D" },
            { id: 23, text: "The distance between two points \\( (2, 3, 5) \\) and \\( (4, 3, 1) \\) is", options: { A: "\\( 22 \\)", B: "\\( \\sqrt{22} \\)", C: "\\( 20 \\)", D: "\\( 2\\sqrt{5} \\)" }, answer: "D" },
            { id: 24, text: "The point \\( (4, 0, 0) \\) lies on", options: { A: "\\( x \\)-axis", B: "\\( y \\)-axis", C: "\\( z \\)-axis", D: "\\( yz \\)-plane" }, answer: "A" },
            { id: 25, text: "The point \\( (0, 2, 0) \\) lies on", options: { A: "\\( x \\)-axis", B: "\\( y \\)-axis", C: "\\( z \\)-axis", D: "\\( zx \\)-plane" }, answer: "B" },
            { id: 26, text: "The point \\( (0, 0, 3) \\) lies on", options: { A: "\\( x \\)-axis", B: "\\( y \\)-axis", C: "\\( z \\)-axis", D: "\\( xy \\)-plane" }, answer: "C" },
            { id: 27, text: "The point \\( (0, 2, 4) \\) lies on", options: { A: "\\( xy \\)-plane", B: "\\( yz \\)-plane", C: "\\( zx \\)-plane", D: "\\( y \\)-axis" }, answer: "B" },
            { id: 28, text: "The point \\( (4, 2, 0) \\) lies on", options: { A: "\\( xy \\)-plane", B: "\\( yz \\)-plane", C: "\\( zx \\)-plane", D: "\\( x \\)-axis" }, answer: "A" },
            { id: 29, text: "The point \\( (3, 0, 4) \\) lies on", options: { A: "\\( xy \\)-plane", B: "\\( yz \\)-plane", C: "\\( zx \\)-plane", D: "\\( z \\)-axis" }, answer: "C" },
            { id: 30, text: "The distance of the point \\( (2, 3, 5) \\) from \\( xy \\)-plane is", options: { A: "\\( 2\\text{ units} \\)", B: "\\( 3\\text{ units} \\)", C: "\\( 5\\text{ units} \\)", D: "\\( \\sqrt{38}\\text{ units} \\)" }, answer: "C" },
            { id: 31, text: "The distance of the point \\( (2, 3, 5) \\) from \\( yz \\)-plane is", options: { A: "\\( 2\\text{ units} \\)", B: "\\( 3\\text{ units} \\)", C: "\\( 5\\text{ units} \\)", D: "\\( \\sqrt{38}\\text{ units} \\)" }, answer: "A" },
            { id: 32, text: "The distance of the point \\( (2, 3, 5) \\) from \\( zx \\)-plane is", options: { A: "\\( 2\\text{ units} \\)", B: "\\( 3\\text{ units} \\)", C: "\\( 5\\text{ units} \\)", D: "\\( \\sqrt{38}\\text{ units} \\)" }, answer: "B" },
            { id: 33, text: "The distance of the point \\( (2, 3, 5) \\) from the origin is", options: { A: "\\( 2\\text{ units} \\)", B: "\\( 3\\text{ units} \\)", C: "\\( 5\\text{ units} \\)", D: "\\( \\sqrt{38}\\text{ units} \\)" }, answer: "D" },
            { id: 34, text: "The point of intersection of the line joining the two points \\( (2, 4, 5) \\) and \\( (-4, 3, -2) \\) and \\( xy \\)-plane is", options: { A: "\\( \\displaystyle \\left(\\frac{23}{7}, -\\frac{16}{7}, 0\\right) \\)", B: "\\( \\displaystyle \\left(-\\frac{16}{7}, \\frac{23}{7}, 0\\right) \\)", C: "\\( \\displaystyle \\left(-\\frac{23}{7}, -\\frac{16}{7}, 0\\right) \\)", D: "\\( \\displaystyle \\left(-\\frac{16}{7}, -\\frac{23}{7}, 0\\right) \\)" }, answer: "B" }
        ];

        const container = document.getElementById('questionsContainer');
        const submitBtn = document.getElementById('submitBtn');
        const quizForm = document.getElementById('quizForm');
        let answeredQuestions = new Set();

        // Render Questions
        questions.forEach((q) => {
            let optionsHtml = '';
            for (const [key, value] of Object.entries(q.options)) {
                optionsHtml += `
                    <label class="option-label">
                        <input type="radio" name="q${q.id}" value="${key}" required>
                        ${key}. ${value}
                    </label>
                `;
            }

            const questionHtml = `
                <div class="question-card" id="card-q${q.id}">
                    <p><strong>${q.id}. ${q.text}</strong></p>
                    <div class="options">
                        ${optionsHtml}
                    </div>
                </div>
            `;
            container.innerHTML += questionHtml;
        });

        // Check if all 34 questions are answered
        quizForm.addEventListener('change', function(e) {
            if (e.target.type === 'radio') {
                answeredQuestions.add(e.target.name);
                if (answeredQuestions.size === questions.length) {
                    submitBtn.disabled = false;
                    submitBtn.innerText = "Submit Answers";
                } else {
                    submitBtn.innerText = `Answered ${answeredQuestions.size} / ${questions.length} Questions`;
                }
            }
        });

        // Handle Submit and Show Mistakes
        quizForm.addEventListener('submit', function(e) {
            e.preventDefault();
            let score = 0;
            let mistakesHtml = "";
            const formData = new FormData(quizForm);
            
            questions.forEach(q => {
                const userAnswer = formData.get(`q${q.id}`);
                const card = document.getElementById(`card-q${q.id}`);
                
                // Reset card styling
                card.style.borderLeftColor = "#0056b3"; 

                if (userAnswer === q.answer) {
                    score++;
                    card.style.borderLeftColor = "#28a745"; // Green for correct
                } else {
                    card.style.borderLeftColor = "#dc3545"; // Red for incorrect
                    mistakesHtml += `
                        <div class="wrong-answer">
                            <strong>Question ${q.id}:</strong> Your answer was <b>${userAnswer || 'None'}</b>. <br>
                            The correct answer is <b>${q.answer}</b>. (${q.options[q.answer]})
                        </div>
                    `;
                }
            });

            const resultDiv = document.getElementById('result');
            resultDiv.style.display = 'block';
            
            let finalHtml = `<div class="score-display">Your Score: ${score} / ${questions.length}</div>`;
            
            if (score === questions.length) {
                finalHtml += `<p style="text-align:center; color: #28a745; font-weight:bold; font-size: 18px;">Excellent! All answers are correct.</p>`;
            } else {
                finalHtml += `<h4 style="color:#d9534f; margin-top: 0;">Review Your Mistakes:</h4>` + mistakesHtml;
            }

            resultDiv.innerHTML = finalHtml;
            
            // Re-render MathJax in case equations are in the result div
            if (window.MathJax) {
                MathJax.typesetPromise([resultDiv]);
            }

            // Scroll to the results
            resultDiv.scrollIntoView({ behavior: 'smooth' });
        });
    </script>
</body>
</html>
