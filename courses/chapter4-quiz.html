            { id: 33, text: "If \\( \\displaystyle \\vec{a} = \\begin{pmatrix} 2 \\\\ -5 \\\\ 8 \\end{pmatrix} \\), \\( \\displaystyle \\vec{b} = \\begin{pmatrix} 1 \\\\ -3 \\\\ -7 \\end{pmatrix} \\) and \\( \\displaystyle \\vec{c} = \\begin{pmatrix} -3 \\\\ 2 \\\\ -1 \\end{pmatrix} \\), then the unit vector(s) parallel to \\( \\displaystyle \\vec{a} + \\vec{b} + \\vec{c} \\) is(are)", options: { A: "\\( \\displaystyle 6\\begin{pmatrix} 0 \\\\ -6 \\\\ 0 \\end{pmatrix} \\)", B: "\\( \\displaystyle -6\\begin{pmatrix} 0 \\\\ -6 \\\\ 0 \\end{pmatrix} \\)", C: "\\( \\displaystyle \\pm 6\\begin{pmatrix} 0 \\\\ -6 \\\\ 0 \\end{pmatrix} \\)", D: "\\( \\displaystyle \\pm \\frac{1}{6}\\begin{pmatrix} 0 \\\\ -6 \\\\ 0 \\end{pmatrix} \\)" }, answer: "D" },
            { id: 34, text: "A unit vector in the direction of the vector \\( \\displaystyle \\vec{a} = \\begin{pmatrix} 1 \\\\ 2 \\\\ 3 \\end{pmatrix} \\) is", options: { A: "\\( \\displaystyle 14\\begin{pmatrix} 1 \\\\ 2 \\\\ 3 \\end{pmatrix} \\)", B: "\\( \\displaystyle \\pm 14\\begin{pmatrix} 1 \\\\ 2 \\\\ 3 \\end{pmatrix} \\)", C: "\\( \\displaystyle \\pm \\frac{1}{\\sqrt{14}}\\begin{pmatrix} 1 \\\\ 2 \\\\ 3 \\end{pmatrix} \\)", D: "\\( \\displaystyle \\frac{1}{\\sqrt{14}}\\begin{pmatrix} 1 \\\\ 2 \\\\ 3 \\end{pmatrix} \\)" }, answer: "D" },
            { id: 35, text: "The position vectors of points \\( \\displaystyle A \\) and \\( \\displaystyle B \\) are \\( \\displaystyle \\vec{a} = \\begin{pmatrix} 1 \\\\ -1 \\\\ 2 \\end{pmatrix} \\) and \\( \\displaystyle \\vec{b} = \\begin{pmatrix} 3 \\\\ -1 \\\\ 3 \\end{pmatrix} \\). The position vector of the midpoint of the line \\( \\displaystyle AB \\) is", options: { A: "\\( \\displaystyle \\frac{1}{2}\\begin{pmatrix} 1 \\\\ -1 \\\\ 1 \\end{pmatrix} \\)", B: "\\( \\displaystyle \\frac{1}{2}\\begin{pmatrix} 4 \\\\ -2 \\\\ 5 \\end{pmatrix} \\)", C: "\\( \\displaystyle \\frac{1}{2}\\begin{pmatrix} 3 \\\\ -1 \\\\ 3 \\end{pmatrix} \\)", D: "\\( \\displaystyle \\begin{pmatrix} 4 \\\\ -2 \\\\ 5 \\end{pmatrix} \\)" }, answer: "B" }
        ];

        const container = document.getElementById('questionsContainer');
        const submitBtn = document.getElementById('submitBtn');
        const quizForm = document.getElementById('quizForm');
        let answeredQuestions = new Set();

        // Render Questions
        questions.forEach((q) => {
            let optionsHtml = '';
            for (const [key, value] of Object.entries(q.options)) {
                optionsHtml += `
                    <label class="option-label">
                        <input type="radio" name="q${q.id}" value="${key}" required>
                        <span style="margin-right: 12px; font-weight: bold;">${key}.</span> ${value}
                    </label>
                `;
            }

            const questionHtml = `
                <div class="question-card" id="card-q${q.id}">
                    <p><strong>Q${q.id}. ${q.text}</strong></p>
                    <div class="options">
                        ${optionsHtml}
                    </div>
                </div>
            `;
            container.innerHTML += questionHtml;
        });

        // Check if all questions are answered
        quizForm.addEventListener('change', function(e) {
            if (e.target.type === 'radio') {
                answeredQuestions.add(e.target.name);
                if (answeredQuestions.size === questions.length) {
                    submitBtn.disabled = false;
                    submitBtn.innerText = "Submit Answers";
                } else {
                    submitBtn.innerText = `Answered ${answeredQuestions.size} / ${questions.length} Questions`;
                }
            }
        });

        // Handle Submit and Show Mistakes
        quizForm.addEventListener('submit', function(e) {
            e.preventDefault();
            let score = 0;
            let mistakesHtml = "";
            const formData = new FormData(quizForm);
            
            questions.forEach(q => {
                const userAnswer = formData.get(`q${q.id}`);
                const card = document.getElementById(`card-q${q.id}`);
                
                // Reset card styling
                card.style.borderLeftColor = "#0056b3"; 

                if (userAnswer === q.answer) {
                    score++;
                    card.style.borderLeftColor = "#28a745"; // Green for correct
                } else {
                    card.style.borderLeftColor = "#dc3545"; // Red for incorrect
                    mistakesHtml += `
                        <div class="wrong-answer">
                            <strong>Question ${q.id}:</strong> Your answer was <b>${userAnswer || 'None'}</b>. <br>
                            The correct answer is <span style="font-weight: bold; margin-right: 5px;">${q.answer}.</span> ${q.options[q.answer]}
                        </div>
                    `;
                }
            });

            const resultDiv = document.getElementById('result');
            resultDiv.style.display = 'block';
            
            let finalHtml = `<div class="score-display">Your Score: ${score} / ${questions.length}</div>`;
            
            if (score === questions.length) {
                finalHtml += `<p style="text-align:center; color: #28a745; font-weight:bold; font-size: 18px;">Excellent! All answers are correct.</p>`;
            } else {
                finalHtml += `<h4 style="color:#d9534f; margin-top: 0;">Review Your Mistakes:</h4>` + mistakesHtml;
            }

            resultDiv.innerHTML = finalHtml;
            
            // Re-render MathJax in case equations are in the result div
            if (window.MathJax) {
                MathJax.typesetPromise([resultDiv]);
            }

            // Scroll to the results
            resultDiv.scrollIntoView({ behavior: 'smooth' });
        });
    </script>
</body>
</html>
